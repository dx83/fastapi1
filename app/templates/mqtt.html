<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>MQTT Test</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        input {
            width: 300px;
            margin: 5px;
        }

        button {
            margin: 5px;
        }

        #log {
            margin-top: 20px;
            border: 1px solid #ccc;
            height: 300px;
            overflow: auto;
            padding: 10px;
            background: #f5f5f5;
        }
    </style>
</head>

<body>
    <h2>MQTT 테스트</h2>

    Broker<br>
    <input id="broker" value="ws://10.174.96.119:39001"><br>

    Topic<br>
    <input id="topic" value="pknu/class207"><br>

    Message<br>
    <input id="message" value="Hello MQTT"><br>

    <button onclick="connect()">Connect</button>
    <button onclick="subscribe()">Subscribe</button>
    <button onclick="publish()">Publish</button>
    <button onclick="disconnect()">Disconnect</button>

    <div id="log"></div>

    <script>
        let client;

        function log(msg) {
            const logDiv = document.getElementById("log");
            const div = document.createElement("div");
            div.textContent = msg;

            logDiv.appendChild(div);

            // 스크롤을 맨 아래로 이동
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function connect() {
            const broker = document.getElementById("broker").value;

            client = mqtt.connect(broker);

            client.on("connect", () => {
                log("Connected");
            });

            client.on("message", (topic, message) => {
                log("Receive : " + topic + " => " + message.toString());
            });

            client.on("error", (err) => {
                log("Error : " + err);
            });

            client.on("close", () => {
                log("Disconnected");
            });
        }

        function subscribe() {
            const topic = document.getElementById("topic").value;
            client.subscribe(topic);
            log("Subscribe : " + topic);
        }

        function publish() {
            const topic = document.getElementById("topic").value;
            const message = document.getElementById("message").value;

            client.publish(topic, message);

            log("Publish : " + message);
        }

        function disconnect() {
            client.end();
        }
    </script>
</body>

</html>
